<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var path = window.location.pathname;
      if (path.endsWith("/index.html")) {
        path = path.slice(0, -"/index.html".length);
      }
      if (!path.endsWith("/")) {
        path += "/";
      }
      window.location.replace(path + "home.html" + window.location.search + window.location.hash);
    })();
  </script>
  <title>Redirecting...</title>
</head>
<body>
  If you are not redirected, <a href="./home.html">click here</a>.
</body>
</html>
